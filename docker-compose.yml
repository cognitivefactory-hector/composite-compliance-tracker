services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: composite
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d composite"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    # Override the image's gunicorn CMD with the auto-reloading dev server.
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/composite
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: dev-insecure-change-me
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
