services:
  - type: web
    name: composite-compliance-tracker
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: composite-db
          property: connectionString
      # Load the synthetic shop on each start so the public demo is never empty.
      - key: SEED_ON_START
        value: "true"
      # Custom domain (Cloudflare → Render). RENDER_EXTERNAL_HOSTNAME is trusted
      # automatically; localhost/127/0.0.0.0 are kept so Render health checks pass.
      - key: DJANGO_ALLOWED_HOSTS
        value: "composite.hector-garza.com,localhost,127.0.0.1,0.0.0.0"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://composite.hector-garza.com"
      # Set in the Render dashboard only if enabling the optional Claude assist.
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  # Paid Postgres (Basic): a workspace may only hold one *free* Postgres and
  # free instances expire after 30 days, so a persistent demo uses a paid tier.
  - name: composite-db
    plan: basic-256mb
    databaseName: composite
    user: composite
