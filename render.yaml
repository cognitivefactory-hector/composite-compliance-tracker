services:
  - type: web
    name: composite-compliance-tracker
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: composite-db
          property: connectionString
      # Set in the Render dashboard only if enabling the optional Claude assist.
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: composite-db
    plan: free
    databaseName: composite
    user: composite
